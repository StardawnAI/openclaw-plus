# ══════════════════════════════════════════════════════════════════════════════
# OpenClaw Docker Compose Override — Cloudflare / Coolify (Traefik)
# ══════════════════════════════════════════════════════════════════════════════
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d
#
# In Coolify: set Docker Compose Location to /docker-compose.cloudflare.yml
# IMPORTANT: this must be set at resource creation time (cannot be changed later).
# ══════════════════════════════════════════════════════════════════════════════

services:
  openclaw:
    # Override: use expose instead of ports — Traefik routes via domain name.
    ports: !override []
    expose:
      - "${PORT:-8080}"
    environment:
      # Override: enable proxy header stripping for Cloudflare Tunnel
      - OPENCLAW_STRIP_PROXY_HEADERS=true
