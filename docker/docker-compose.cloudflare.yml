# ══════════════════════════════════════════════════════════════════════════════
# OpenClaw — Cloudflare Wildcard Override
# ══════════════════════════════════════════════════════════════════════════════
#
# Inherits EVERYTHING from docker-compose.yml, only replaces ports → expose.
# Traefik/Coolify routes via domain, server IP stays hidden behind Cloudflare.
#
# In Coolify: set Docker Compose Location → /docker/docker-compose.cloudflare.yml
# ══════════════════════════════════════════════════════════════════════════════

include:
  - docker-compose.yml

services:
  openclaw:
    ports: !override []
    expose:
      - "${PORT:-8080}"
