# ══════════════════════════════════════════════════════════════════════════════
# OpenClaw Docker Compose — Cloudflare / Coolify (Traefik)
# ══════════════════════════════════════════════════════════════════════════════
#
# Uses `expose` instead of `ports` — Traefik routes via domain name.
# Server IP stays hidden behind Cloudflare.
#
# In Coolify: set Docker Compose Location to /docker-compose-cloudflare.yml
# IMPORTANT: this must be set at resource creation time (cannot be changed later).
# ══════════════════════════════════════════════════════════════════════════════

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_GIT_REF: ${OPENCLAW_GIT_REF:-main}
    expose:
      - "${PORT:-8080}"
    environment:
      # ── AI Provider (at least one required) ──────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}

      # ── Auth ─────────────────────────────────────────────────────────────
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}

      # ── Model selection ──────────────────────────────────────────────────
      - OPENCLAW_PRIMARY_MODEL=${OPENCLAW_PRIMARY_MODEL:-}

      # ── Cloudflare Tunnel Fix ────────────────────────────────────────────
      # Enabled by default: strips proxy headers for Cloudflare Tunnel.
      - OPENCLAW_STRIP_PROXY_HEADERS=${OPENCLAW_STRIP_PROXY_HEADERS:-true}
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS:-}

      # ── Browser sidecar ──────────────────────────────────────────────────
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true

      # ── Port ─────────────────────────────────────────────────────────────
      - PORT=${PORT:-8080}
    volumes:
      - openclaw-data:/data
    depends_on:
      - browser
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  browser:
    image: coollabsio/openclaw-browser:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped

volumes:
  openclaw-data:
  browser-data:
