# ══════════════════════════════════════════════════════════════════════════════
# OpenClaw Docker Compose — Standard (with ports)
# ══════════════════════════════════════════════════════════════════════════════
#
# For Cloudflare/Coolify: use docker-compose-cloudflare.yml instead.
# ══════════════════════════════════════════════════════════════════════════════

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_GIT_REF: ${OPENCLAW_GIT_REF:-main}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      # ── AI Provider (set at least one) ──────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-xxx...}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-proj-xxx...}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-sk-or-v1-xxx...}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSy-xxx...}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-sk-opencode-xxx...}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-gho_xxx...}

      # ── Auth ─────────────────────────────────────────────────────────────
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-test}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-sk-gateway-xxx...}

      # ── Model selection ──────────────────────────────────────────────────
      - OPENCLAW_PRIMARY_MODEL=${OPENCLAW_PRIMARY_MODEL:-claude-3-5-sonnet-latest}

      # ── Cloudflare Tunnel Fix ────────────────────────────────────────────
      # Set to "true" when running behind Cloudflare Tunnel or reverse proxy.
      # The cloudflare compose file already sets this to true.
      - OPENCLAW_STRIP_PROXY_HEADERS=${OPENCLAW_STRIP_PROXY_HEADERS:-false}
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS:-}

      # ── Browser sidecar ──────────────────────────────────────────────────
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true

      # ── Port ─────────────────────────────────────────────────────────────
      - PORT=${PORT:-8080}
    volumes:
      - openclaw-data:/data
    depends_on:
      - browser
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  browser:
    image: coollabsio/openclaw-browser:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped

volumes:
  openclaw-data:
  browser-data:
