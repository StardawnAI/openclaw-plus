# ══════════════════════════════════════════════════════════════════════════════
# OpenClaw — Direct Port Access Override
# ══════════════════════════════════════════════════════════════════════════════
#
# Adds host port mapping for standalone use (without Coolify/Traefik).
# Usage: docker compose -f docker-compose.yml -f docker-compose.ports.yml up -d
# ══════════════════════════════════════════════════════════════════════════════

services:
  openclaw:
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
